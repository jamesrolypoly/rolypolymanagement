<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Roly Poly — artist and songwriter management."
    />
    <title>Roly Poly Management</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="identity" aria-labelledby="company-name">
        <h1 id="company-name" class="visually-hidden">
          Roly Poly Management
        </h1>

        <div class="logo-lockup">
          <img
            class="logo"
            src="assets/roly-poly-logo.png"
            alt="Roly Poly"
            width="882"
            height="749"
          />
        </div>

        <p class="descriptor">artist &amp; songwriter management</p>
      </section>

      <a
        class="email-link"
        href="mailto:james@rolypolymanagement.com"
        aria-label="Email Roly Poly Management"
        title="james@rolypolymanagement.com"
      >
        <svg
          aria-hidden="true"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect x="3" y="5.5" width="18" height="13" rx="2.25" />
          <path d="m4 7 8 6 8-6" />
        </svg>
      </a>
    </main>

    <div class="cursor-trail" aria-hidden="true"></div>
    <div class="custom-cursor" aria-hidden="true"></div>
    <script src="script.js"></script>
  </body>
</html>

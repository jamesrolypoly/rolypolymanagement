<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c5c5c2"/>
      <stop offset=".22" stop-color="#bcbcb9"/>
      <stop offset=".48" stop-color="#c9c9c6"/>
      <stop offset=".72" stop-color="#b8b8b5"/>
      <stop offset="1" stop-color="#c4c4c1"/>
    </linearGradient>

    <filter id="mineral-clouds" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence
        type="fractalNoise"
        baseFrequency=".007 .028"
        numOctaves="4"
        seed="31"
        result="clouds"
      />
      <feColorMatrix
        in="clouds"
        type="matrix"
        values=".6 0 0 0 .2
                0 .6 0 0 .2
                0 0 .58 0 .2
                0 0 0 .34 0"
      />
    </filter>

    <filter id="fine-grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence
        type="fractalNoise"
        baseFrequency=".19"
        numOctaves="3"
        seed="14"
        result="grain"
      />
      <feColorMatrix
        in="grain"
        type="matrix"
        values=".35 0 0 0 .34
                0 .35 0 0 .34
                0 0 .34 0 .34
                0 0 0 .24 0"
      />
    </filter>

    <filter id="blur-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>

    <filter id="blur-pore" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation=".75"/>
    </filter>

    <pattern id="pores" width="230" height="190" patternUnits="userSpaceOnUse">
      <g fill="#777773" opacity=".28" filter="url(#blur-pore)">
        <ellipse cx="18" cy="24" rx="4.8" ry="2.2"/>
        <ellipse cx="58" cy="76" rx="2.2" ry="4.1"/>
        <ellipse cx="103" cy="31" rx="3.2" ry="1.7"/>
        <ellipse cx="146" cy="91" rx="5.4" ry="2.4"/>
        <ellipse cx="205" cy="42" rx="2.4" ry="3.6"/>
        <ellipse cx="31" cy="147" rx="3.8" ry="1.8"/>
        <ellipse cx="85" cy="122" rx="1.8" ry="2.6"/>
        <ellipse cx="127" cy="165" rx="4.6" ry="2.1"/>
        <ellipse cx="183" cy="138" rx="2.8" ry="1.5"/>
        <circle cx="219" cy="173" r="1.7"/>
        <circle cx="74" cy="13" r="1.3"/>
        <circle cx="171" cy="18" r="1.8"/>
        <circle cx="12" cy="99" r="1.4"/>
        <circle cx="112" cy="104" r="1.1"/>
        <circle cx="197" cy="104" r="1.3"/>
      </g>
      <g fill="#ecece8" opacity=".4">
        <ellipse cx="41" cy="49" rx="3.5" ry="1.5"/>
        <ellipse cx="119" cy="66" rx="2.7" ry="1.2"/>
        <ellipse cx="174" cy="117" rx="4.2" ry="1.6"/>
        <ellipse cx="65" cy="170" rx="2.8" ry="1.3"/>
        <circle cx="217" cy="82" r="1.4"/>
      </g>
    </pattern>
  </defs>

  <rect width="1600" height="1000" fill="url(#base)"/>
  <rect width="1600" height="1000" filter="url(#mineral-clouds)" opacity=".62"/>

  <g fill="none" stroke-linecap="round" filter="url(#blur-soft)">
    <path d="M205-80c-33 249 47 379-2 593-40 176-3 351 41 567" stroke="#efefeb" stroke-width="36" opacity=".18"/>
    <path d="M565-80c53 214-33 365 9 559 38 178-4 344-39 594" stroke="#858581" stroke-width="27" opacity=".12"/>
    <path d="M978-80c-34 260 55 400 5 614-37 158 9 303 39 550" stroke="#efefeb" stroke-width="46" opacity=".17"/>
    <path d="M1370-80c45 250-27 374 17 579 38 178-15 339-34 575" stroke="#83837f" stroke-width="30" opacity=".1"/>
  </g>

  <rect width="1600" height="1000" filter="url(#fine-grain)" opacity=".52"/>
  <rect width="1600" height="1000" fill="url(#pores)" opacity=".82"/>
</svg>
